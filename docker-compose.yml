services:
  db:
    image: postgres:15-alpine
    container_name: starterapp_dev_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=starterapp_dev_db
    expose:
      - "5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/certs:/certs
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - app-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: starterapp_dev_backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_DATABASE: starterapp_dev_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.starterapp.dev`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./apps/backend:/app
      - /app/.venv
    command: uv run uvicorn starterapp.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: starterapp_dev_frontend
    environment:
      API_URL: https://api.starterapp.dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`starterapp.dev`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./apps/frontend:/app
    command: sh -c "pnpm install --force && rm -rf dist && pnpm run dev"

  db-test:
    image: postgres:15-alpine
    container_name: starterapp_test_db
    environment:
      - POSTGRES_USER=starterapp
      - POSTGRES_PASSWORD=starterapp
      - POSTGRES_DB=starterapp_test_db
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data  # RAM-only, fast, disposable
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
