services:
  db:
    image: postgres:15-alpine
    container_name: faskplusai_dev_db
    environment:
      POSTGRES_USER: ${FASKPLUSAI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${FASKPLUSAI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${FASKPLUSAI_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/certs:/certs
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - app-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: faskplusai_dev_backend
    environment:
      FASKPLUSAI_ENV: ${FASKPLUSAI_ENV}
      FASKPLUSAI_POSTGRES_USER: ${FASKPLUSAI_POSTGRES_USER}
      FASKPLUSAI_POSTGRES_PWD: ${FASKPLUSAI_POSTGRES_PASSWORD}
      FASKPLUSAI_POSTGRES_HOST: db
      FASKPLUSAI_POSTGRES_PORT: "5433"
      FASKPLUSAI_POSTGRES_DATABASE: ${FASKPLUSAI_POSTGRES_DB}
      FASKPLUSAI_JWT_SECRET_KEY: ${FASKPLUSAI_JWT_SECRET_KEY}
      FASKPLUSAI_CORS_ORIGINS: ${FASKPLUSAI_CORS_ORIGINS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.faskplusai.dev`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./apps/backend:/app
      - /app/.venv
    command: uv run uvicorn faskplusai.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: faskplusai_dev_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: ${NODE_ENV}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`faskplusai.dev`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./apps/frontend:/app
    user: root
    command: sh -c "pnpm install && pnpm run dev"

  db-test:
    image: postgres:15-alpine
    container_name: faskplusai_test_db
    environment:
      POSTGRES_USER: faskplusai
      POSTGRES_PASSWORD: faskplusai
      POSTGRES_DB: faskplusai_test_db
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data  # RAM-only, fast, disposable
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
